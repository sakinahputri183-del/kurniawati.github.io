<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enola - Mesin Pencari</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        body {
            background-color: #f5f1e9;
            color: #2d2d2d;
            line-height: 1.5;
        }

        /* Menu Kanan Atas */
        .top-menu {
            text-align: right;
            padding: 15px 25px;
            font-size: 14px;
        }

        .top-menu a {
            color: #4a4a4a;
            text-decoration: none;
            margin-left: 18px;
            transition: color 0.3s;
        }

        .top-menu a:hover {
            color: #8b4513;
            text-decoration: underline;
        }

        .menu-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-right: 5px;
        }

        /* Konten Utama */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 75vh;
            padding: 20px;
        }

        /* Logo Enola */
        .logo {
            font-size: 80px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 30px;
            color: #8b4513;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .magnifier-icon {
            display: inline-block;
            width: 50px;
            height: 50px;
            vertical-align: middle;
            fill: #8b4513;
            margin: 0 5px;
        }

        /* Form Pencarian */
        .search-form {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #d2b48c;
            border-radius: 25px;
            background-color: #fff;
            font-size: 16px;
            color: #2d2d2d;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.08);
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #8b4513;
        }

        .search-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            background-color: #d2b48c;
            color: #2d2d2d;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #8b4513;
            color: #fff;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #6b6b6b;
            border-top: 1px solid #d2b48c;
        }

        /* Responsif */
        @media (max-width: 500px) {
            .logo {
                font-size: 50px;
            }

            .magnifier-icon {
                width: 35px;
                height: 35px;
            }

            .top-menu a {
                margin-left: 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Menu Kanan Atas: Email → Gambar → Pengaturan → Akun -->
    <div class="top-menu">
        <a href="https://mail.google.com" target="_blank">Email</a>
        <a href="https://images.google.com" target="_blank">Gambar</a>
        <a href="#" title="Pengaturan">
            <svg class="menu-icon" viewBox="0 0 24 24">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
        </a>
        <a href="#" title="Akun">
            <svg class="menu-icon" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </a>
    </div>

    <!-- Konten Utama -->
    <div class="container">
        <div class="logo">
            EN
            <svg class="magnifier-icon" viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            LA
        </div>

        <form class="search-form" action="https://www.google.com/search" method="get" target="_blank">
            <input type="text" class="search-input" name="q" placeholder="Cari apa saja dengan Enola..." required>
            <div class="search-buttons">
                <button type="submit" class="btn">Cari dengan Enola</button>
                <button type="button" class="btn" onclick="document.querySelector('.search-input').value = ''">Hapus</button>
            </div>
        </form>
    </div>

    <!-- Footer tanpa tulisan Tampilan Vintage -->
    <div class="footer">
        © 2026 Enola Search
    </div>
</body>
</html>
